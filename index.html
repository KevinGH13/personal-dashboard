<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Clock">
  <title>Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

  <div class="layout">

    <!-- Columna izquierda: reloj -->
    <div class="col-clock">
      <div class="clock-block">
        <div id="time" class="time">00:00</div>
        <div class="date-block">
          <span id="weekday" class="weekday">domingo</span>
          <span id="date" class="date">13 de abril</span>
        </div>
      </div>
    </div>

    <!-- Columna derecha: agenda -->
    <div class="col-agenda">
      <div class="agenda-header">agenda</div>
      <div id="agenda" class="agenda-list">
        <div class="agenda-loading">cargando&hellip;</div>
      </div>
    </div>

  </div>

  <!-- Toggle modo oscuro/claro -->
  <button class="mode-toggle" id="mode-toggle" onclick="toggleMode()" aria-label="Cambiar modo">
    <svg id="icon-sun" class="mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2"  x2="12" y2="5"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="2"  y1="12" x2="5"  y2="12"/>
      <line x1="19" y1="12" x2="22" y2="12"/>
      <line x1="4.22"  y1="4.22"  x2="6.34"  y2="6.34"/>
      <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
      <line x1="4.22"  y1="19.78" x2="6.34"  y2="17.66"/>
      <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>
    </svg>
    <svg id="icon-moon" class="mode-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
    </svg>
  </button>

  <script src="app.js"></script>
</body>
</html>
